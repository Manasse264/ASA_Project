{% extends "asa/index.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 20px;">Reset Password</h2>
    <p style="text-align: center; margin-bottom: 20px;">Forgotten your password? Enter your email address below, and we'll email instructions for setting a new one.</p>
    <form method="post" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}
        <div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
            <label for="id_email" style="font-weight: bold; color: var(--primary-color);">Email address:</label>
            <input type="email" name="email" autocomplete="email" required id="id_email" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <button type="submit" class="btn btn-filled" style="cursor: pointer; width: 100%; border: none; padding: 10px; font-size: 1rem;">Send email</button>
    </form>
</div>
{% endblock %}
