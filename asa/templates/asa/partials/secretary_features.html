<section class="secretary-dashboard">
    <div class="dashboard-heading">
        <div>
            <h2>Church Secretary</h2>
        </div>
        <div class="dashboard-summary">
            <div class="member-count">
                <span>{{ member_count|default:0 }}</span>
                <small>Registered members</small>
            </div>
            <div class="member-count">
                <span>{{ department_count|default:0 }}</span>
                <small>Departments</small>
            </div>
            <a href="{% url 'member_create' %}" class="btn btn-filled">Add New Member</a>
            <a href="{% url 'council_member_list' %}" class="btn btn-outline" style="color: var(--primary-color); border-color: var(--primary-color);">Council Members</a>
            <a href="{% url 'department_list' %}" class="btn btn-outline" style="color: var(--primary-color); border-color: var(--primary-color);">Departments</a>
            <a href="{% url 'choir_list' %}" class="btn btn-outline" style="color: var(--primary-color); border-color: var(--primary-color);">Manage Choirs</a>
            <a href="{% url 'candidate_list' %}" class="btn btn-outline" style="color: var(--primary-color); border-color: var(--primary-color);">Baptism Candidates</a>
        </div>
    </div>
</section>
